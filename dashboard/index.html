<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Defense Simulator</title>
    <style>
        :root {
            color: #e2e8f0;
            background: #0f172a;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background:
                linear-gradient(135deg, rgba(15, 23, 42, 0.96), rgba(88, 28, 135, 0.72)),
                radial-gradient(circle at 50% 20%, rgba(56, 189, 248, 0.2), transparent 38%);
        }

        main {
            width: min(92vw, 680px);
            padding: 34px;
            border: 1px solid rgba(148, 163, 184, 0.24);
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.82);
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.32);
            text-align: center;
        }

        h1 {
            margin: 0;
            color: #f8fafc;
            font-size: 42px;
        }

        p {
            color: #cbd5e1;
            line-height: 1.6;
        }

        a {
            display: inline-flex;
            margin-top: 12px;
            padding: 12px 18px;
            border-radius: 8px;
            background: #38bdf8;
            color: #082f49;
            font-weight: 800;
            text-decoration: none;
        }

        strong {
            color: #fef3c7;
        }
    </style>
</head>
<body>
    <main>
        <h1>Cyber Defense Simulator</h1>
        <p>This repository contains a React dashboard powered by a FastAPI backend. Start the backend locally, then open the app from localhost.</p>
        <p><strong>Created, Founded & Engineered By Dev Gabani.</strong></p>
        <a href="http://127.0.0.1:8000/">Open Local Dashboard</a>
    </main>
</body>
</html>
